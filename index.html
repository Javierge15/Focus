    <style>
        :root { color-scheme: dark; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0A0A0A; 
            color: #E5E7EB;
            overflow-x: hidden;
        }
        
        .glow-1 {
            position: fixed; top: -150px; right: -100px; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%; z-index: -1; pointer-events: none; filter: blur(40px);
        }
        .glow-2 {
            position: fixed; bottom: -200px; left: -150px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%; z-index: -1; pointer-events: none; filter: blur(50px);
        }

        .editor-toolbar { border: none; border-bottom: 1px solid rgba(255,255,255,0.05); opacity: 0.6; transition: opacity 0.2s; padding: 0 0 8px 0; }
        .editor-toolbar:hover { opacity: 1; }
        .editor-toolbar > button { color: #9CA3AF !important; }
        .editor-toolbar > button.active, .editor-toolbar > button:hover { color: #F9FAFB !important; background: rgba(255,255,255,0.05) !important; border: none; }
        .editor-toolbar > i.separator { border-left: 1px solid rgba(255,255,255,0.1) !important; border-right: none !important; }
        
        .CodeMirror { border: none !important; background-color: transparent !important; font-family: 'Inter', sans-serif; font-size: 16px; padding-left: 0; color: #D1D5DB !important; caret-color: #F9FAFB !important; }
        .editor-statusbar { display: none; }
        
        .task-check { border-color: #4B5563; }
        .task-item:hover .task-check { border-color: #E5E7EB; background-color: rgba(255,255,255,0.05); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4B5563; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center pt-16 px-6 sm:px-8 selection:bg-indigo-500/30">

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="w-full max-w-2xl relative z-10" id="app-content" style="display: none;">
        <header class="flex justify-between items-end mb-12 border-b border-white/5 pb-4">
            <h1 class="text-xl font-medium tracking-tight text-white">Focus</h1>
            <nav class="flex gap-6 text-sm font-medium text-gray-500">
                <button type="button" onclick="switchTab('todo')" id="nav-todo" class="hover:text-white transition-colors text-white">TODO</button>
                <button type="button" onclick="switchTab('diario')" id="nav-diario" class="hover:text-white transition-colors">DIARIO</button>
            </nav>
        </header>

        <main id="view-todo" class="block">
            <input type="text" id="task-input" placeholder="Nueva tarea... (Presiona Enter)"
                class="w-full bg-transparent text-lg placeholder-gray-600 text-white focus:outline-none mb-8 pb-2 border-b border-transparent focus:border-white/20 transition-colors disabled:opacity-50">
            
            <ul id="task-list" class="space-y-4 text-gray-300">
                <li class="text-sm text-gray-500 animate-pulse">Cargando tareas...</li>
            </ul>
        </main>

        <main id="view-diario" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <input type="date" id="diario-date" class="bg-transparent text-sm font-medium text-gray-400 hover:text-white focus:outline-none cursor-pointer transition-colors">
                <span id="save-status" class="text-xs font-medium text-gray-500 transition-opacity opacity-0">Guardado</span>
            </div>
            <textarea id="markdown-editor"></textarea>
            <p class="text-xs text-gray-500 mt-4 text-right">Presiona <kbd class="bg-white/10 px-1.5 py-0.5 rounded border border-white/10 text-gray-300">Cmd/Ctrl + S</kbd> para guardar.</p>
        </main>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyAkm-dZ01V5Bv1_UM1Bj5Ql4rkaaocYpTEshoSM0BRkUk7bnEPJQhz5KYYSYr8N3e33A/exec';
        
        let easyMDE = null;
        let currentTasks = [];
        let userPin = localStorage.getItem('focus_pin');

        // --- SISTEMA DE PIN ---
        function checkSecurity() {
            if (!userPin) {
                userPin = prompt("Introduce tu PIN de seguridad");
                if (userPin) {
                    localStorage.setItem('focus_pin', userPin);
                    loadTareas();
                } else {
                    document.body.innerHTML = '<div class="flex items-center justify-center min-h-screen text-gray-500">Acceso denegado. Recarga la página para intentarlo de nuevo.</div>';
                }
            } else {
                document.getElementById('app-content').style.display = 'block';
                loadTareas();
            }
        }

        function switchTab(tab) {
            document.getElementById('view-todo').style.display = tab === 'todo' ? 'block' : 'none';
            document.getElementById('view-diario').style.display = tab === 'diario' ? 'block' : 'none';
            
            document.getElementById('nav-todo').classList.toggle('text-white', tab === 'todo');
            document.getElementById('nav-todo').classList.toggle('text-gray-500', tab !== 'todo');
            
            document.getElementById('nav-diario').classList.toggle('text-white', tab === 'diario');
            document.getElementById('nav-diario').classList.toggle('text-gray-500', tab !== 'diario');

            if (tab === 'diario' && !easyMDE) initEditor();
        }

        async function loadTareas() {
            try {
                const res = await fetch(`${API_URL}?action=getTareas&pin=${userPin}`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    currentTasks = data.data;
                    renderTareas();
                    // Si los datos bajan bien, mostramos la app
                    document.getElementById('app-content').style.display = 'block'; 
                } else {
                    // SI EL PIN ES MALO, BORRAMOS Y PEDIMOS DE NUEVO
                    alert("PIN Incorrecto. Acceso denegado.");
                    localStorage.removeItem('focus_pin');
                    location.reload(); 
                }
            } catch (error) {
                document.getElementById('task-list').innerHTML = '<li class="text-red-400 text-sm">Error de conexión.</li>';
            }
        }

        function renderTareas() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            if (currentTasks.length === 0) {
                list.innerHTML = '<li class="text-sm text-gray-600">Nada pendiente. Zen absoluto.</li>';
                return;
            }
            currentTasks.forEach(t => {
                const li = document.createElement('li');
                li.className = 'task-item flex items-center gap-4 group cursor-pointer';
                li.innerHTML = `
                    <div class="task-check w-4 h-4 rounded-full border flex-shrink-0 transition-all duration-200"></div>
                    <span class="text-[17px] tracking-tight group-hover:text-white transition-colors">${t.tarea}</span>
                `;
                li.onclick = () => completeTarea(t.id, li);
                list.appendChild(li);
            });
        }

        document.getElementById('task-input').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                const input = e.target;
                const tarea = input.value.trim();
                
                input.disabled = true; // Bloquea duplicados
                input.value = ''; 
                input.placeholder = 'Guardando...';
                
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        // Adjuntamos el PIN en el Body
                        body: JSON.stringify({ action: 'addTarea', tarea: tarea, pin: userPin }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        currentTasks.push({ id: data.id, tarea: tarea, estado: 'Pendiente' });
                        renderTareas();
                    } else {
                        handleAuthError(data);
                    }
                } catch (error) {
                    console.error("Error al guardar", error);
                }
                
                input.disabled = false;
                input.placeholder = 'Nueva tarea... (Presiona Enter)';
                input.focus();
            }
        });

        async function completeTarea(id, element) {
            element.style.opacity = '0.3';
            element.style.textDecoration = 'line-through';
            element.style.pointerEvents = 'none';
            element.querySelector('.task-check').style.backgroundColor = '#E5E7EB';
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'completeTarea', id: id, pin: userPin }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    currentTasks = currentTasks.filter(t => t.id !== id);
                    setTimeout(renderTareas, 300);
                } else {
                    handleAuthError(data);
                    renderTareas();
                }
            } catch (error) {
                console.error("Error al completar", error);
                renderTareas();
            }
        }

        function initEditor() {
            easyMDE = new EasyMDE({ 
                element: document.getElementById('markdown-editor'),
                spellChecker: false,
                status: false,
                autofocus: true,
                placeholder: "Escribe aquí...",
                toolbar: ["bold", "italic", "heading", "|", "quote", "unordered-list", "|", "link"],
            });

            const dateInput = document.getElementById('diario-date');
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
            
            loadDiario(today);

            dateInput.addEventListener('change', (e) => loadDiario(e.target.value));

            easyMDE.codemirror.on("keydown", function(cm, event) {
                if ((event.ctrlKey || event.metaKey) && event.key === 's') {
                    event.preventDefault();
                    saveDiario();
                }
            });
        }

        async function loadDiario(fecha) {
            easyMDE.value("Cargando entrada...");
            try {
                const res = await fetch(`${API_URL}?action=getDiario&fecha=${fecha}&pin=${userPin}`);
                const data = await res.json();
                if (data.status === 'success') {
                    easyMDE.value(data.data || '');
                } else {
                    handleAuthError(data);
                }
            } catch (error) {
                easyMDE.value("");
            }
        }

        async function saveDiario() {
            const statusSpan = document.getElementById('save-status');
            statusSpan.textContent = 'Guardando...';
            statusSpan.style.opacity = '1';

            const fecha = document.getElementById('diario-date').value;
            const contenido = easyMDE.value();

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'saveDiario', fecha: fecha, contenido: contenido, pin: userPin }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    statusSpan.textContent = 'Guardado ✓';
                } else {
                    statusSpan.textContent = 'Error de PIN';
                    handleAuthError(data);
                }
                setTimeout(() => { statusSpan.style.opacity = '0'; }, 2000);
            } catch (error) {
                statusSpan.textContent = 'Error al guardar';
            }
        }

        // Si el PIN está mal, borramos memoria y recargamos
        function handleAuthError(data) {
            if (data.status === 'error' && data.message === 'Acceso denegado') {
                alert("El PIN es incorrecto o ha caducado.");
                localStorage.removeItem('focus_pin');
                window.location.reload();
            }
        }

        // Arrancamos la app comprobando la seguridad
        checkSecurity();
    </script>
</body>
</html>
